<svg xmlns="http://www.w3.org/2000/svg" width="234" height="427" viewBox="0 0 234 427">
  <defs>
    <marker id="arrow" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 Z" fill="#111"/>
    </marker>
    <style>
      .label { font-family: "Microsoft YaHei", "Noto Sans CJK SC", sans-serif; font-size: 9px; fill: #111; text-anchor: middle; dominant-baseline: middle; }
      .small { font-size: 8px; }
      .section { font-family: "Times New Roman", serif; font-size: 10px; font-weight: 700; fill: #111; }
      .box { stroke: #111; stroke-width: 1; }
      .line { stroke: #111; stroke-width: 1.15; fill: none; marker-end: url(#arrow); }
      .plain-line { stroke: #111; stroke-width: 1.15; fill: none; }
    </style>
  </defs>

  <rect width="234" height="427" fill="#fff"/>

  <!-- Output -->
  <rect x="75" y="2" width="84" height="27" fill="#f4f2cf" class="box"/>
