  <path d="M4 358 Q5 375 21 376 H213 Q229 375 230 357" fill="none" stroke="#00a8ff" stroke-width="1.3"/>
  <text x="176" y="350" class="section">Encoder</text>

  <rect x="77" y="158" width="80" height="21" fill="#f7eac8" class="box"/>
  <text x="117" y="168.5" class="label">平均池化</text>

  <rect x="68" y="193" width="99" height="22" fill="#cce0ed" class="box"/>
